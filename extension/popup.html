<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
    }
    h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ef4444;
    }
    .account-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .account-row.warn {
      background: #fffbeb;
      border-color: #fde68a;
    }
    .account-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #16a34a;
      flex-shrink: 0;
    }
    .account-dot.warn { background: #f59e0b; }
    .account-email {
      font-size: 12px;
      font-weight: 500;
      color: #166534;
      word-break: break-all;
    }
    .account-email.warn { color: #92400e; }
    details {
      margin-top: 8px;
    }
    summary {
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
      padding: 4px 0;
    }
    summary:hover { color: #374151; }
    label {
      display: block;
      font-weight: 600;
      margin: 10px 0 4px;
      font-size: 11px;
      color: #6b7280;
    }
    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #ef4444;
    }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 7px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #dc2626; }
    .saved { color: #16a34a; font-size: 11px; margin-top: 6px; text-align: center; }
    .info {
      margin-top: 12px;
      padding: 8px;
      background: #f8fafc;
      border-radius: 6px;
      font-size: 11px;
      color: #6b7280;
      line-height: 1.5;
    }
    .info strong { color: #374151; }
  </style>
</head>
<body>
  <h2>ReEngage Response Copier</h2>

  <div id="account-row" class="account-row warn">
    <div id="account-dot" class="account-dot warn"></div>
    <div id="account-email" class="account-email warn">Detecting account...</div>
  </div>

  <div id="manual-email-section" style="display:none;">
    <label>Your Email</label>
    <input type="email" id="manual-email" placeholder="kshitij@loopai.com" />
  </div>

  <details id="dev-section">
    <summary>Override API URL (testing only)</summary>
    <label>API Base URL</label>
    <input type="text" id="api-base" placeholder="https://... or http://localhost:8000" />
    <button id="save">Save</button>
    <div id="saved-msg" class="saved" style="display:none">Saved!</div>
  </details>

  <div class="info">
    <strong>How it works:</strong><br>
    1. Open DoorDash or UberEats Merchant Portal<br>
    2. Click a review to respond<br>
    3. The extension fetches the AI response<br>
    4. Copy/Paste, then click "Mark as Responded"
  </div>

  <script src="popup.js"></script>
</body>
</html>
